name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu
          - os: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
          - os: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Rust-Toolchain einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust-Abhängigkeiten cachen
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Linux-Systemabhängigkeiten installieren
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libdbus-1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            pkg-config

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      - name: Bauen & Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nova Launcher ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            Lade die passende Version für dein Betriebssystem herunter:

            | Plattform | Datei |
            |-----------|-------|
            | Linux     | `.AppImage` (portable) oder `.deb` |
            | Windows   | `-setup.exe` (Installer) oder `.msi` |
            | macOS     | `.dmg` |

            > Dieses Release wurde automatisch via GitHub Actions gebaut.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
