<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      color: #f0eaff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Subtle radial bg glow that fades in */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(168,85,247,0.12) 0%, transparent 70%);
      animation: bgGlow 0.8s ease-out 0.2s both;
      pointer-events: none;
    }
    @keyframes bgGlow {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo wrapper – floats after build-in ── */
    .logo-wrap {
      width: 128px;
      height: 128px;
      margin-bottom: 28px;
      position: relative;
      animation: float 3.5s ease-in-out 1.8s infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-7px); }
    }

    /* ── SVG glow backdrop ── */
    .glow-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.45) 0%, transparent 70%);
      filter: blur(16px);
      animation: glowPop 0.6s ease-out 0.9s both;
    }
    @keyframes glowPop {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Star petals: shoot from center ── */
    .petal {
      transform-box: fill-box;
      animation: petalIn 0.50s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .pn { transform-origin: center bottom; animation-delay: 0.30s; }
    .pe { transform-origin: left   center; animation-delay: 0.38s; }
    .ps { transform-origin: center top;    animation-delay: 0.46s; }
    .pw { transform-origin: right  center; animation-delay: 0.54s; }

    @keyframes petalIn {
      0%   { opacity: 0; transform: scale(0); }
      80%  { opacity: 1; transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── Inner white highlight ── */
    .inner-star {
      transform-box: fill-box;
      transform-origin: center;
      animation: innerIn 0.40s ease-out 0.90s both;
    }
    @keyframes innerIn {
      from { opacity: 0; transform: scale(0.15); }
      to   { opacity: 0.9; transform: scale(1); }
    }

    /* ── Center dot ── */
    .center-dot {
      transform-box: fill-box;
      transform-origin: center;
      animation: dotIn 0.30s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s both;
    }
    @keyframes dotIn {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Continuous pulse after build-in ── */
    .star-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: starPulse 2.8s ease-in-out 1.8s infinite;
    }
    @keyframes starPulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(0.94); opacity: 0.82; }
    }

    /* ── Text ── */
    .name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #f0eaff;
      animation: fadeUp 0.45s ease-out 1.2s both;
    }
    .sub {
      font-size: 11px;
      color: #5a5075;
      margin-top: 4px;
      letter-spacing: 0.04em;
      animation: fadeUp 0.45s ease-out 1.35s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading dots ── */
    .dots {
      display: flex;
      gap: 6px;
      margin-top: 20px;
      animation: fadeUp 0.4s ease-out 1.5s both;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #a855f7;
      animation: dotPulse 1.4s ease-in-out 1.7s infinite;
    }
    .d2 { animation-delay: 1.9s; }
    .d3 { animation-delay: 2.1s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.75); }
      40%           { opacity: 1;   transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo-wrap">
      <div class="glow-ring"></div>
      <svg viewBox="0 0 100 100" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#f0abfc"/>
            <stop offset="50%"  stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#5b21b6"/>
          </linearGradient>
        </defs>

        <g class="star-group">
          <!-- 4 petals, each shoots from center -->
          <path class="petal pn" d="M50,50 Q40,40 50,7  Q60,40 50,50Z" fill="url(#sg)"/>
          <path class="petal pe" d="M50,50 Q60,40 93,50 Q60,60 50,50Z" fill="url(#sg)"/>
          <path class="petal ps" d="M50,50 Q60,60 50,93 Q40,60 50,50Z" fill="url(#sg)"/>
          <path class="petal pw" d="M50,50 Q40,60 7,50  Q40,40 50,50Z" fill="url(#sg)"/>

          <!-- Inner white diamond -->
          <path class="inner-star"
            d="M50,27 Q55,45 70,50 Q55,55 50,73 Q45,55 30,50 Q45,45 50,27Z"
            fill="white" opacity="0.9"/>

          <!-- Bright center -->
          <circle class="center-dot" cx="50" cy="50" r="4.5" fill="white"/>
        </g>
      </svg>
    </div>

    <p class="name">Nova Launcher</p>
    <p class="sub">wird gestartet…</p>
    <div class="dots">
      <span class="dot d1"></span>
      <span class="dot d2"></span>
      <span class="dot d3"></span>
    </div>
  </div>
</body>
</html>
