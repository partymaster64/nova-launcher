<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      color: #f0eaff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: contentIn 0.4s ease-out both;
    }

    @keyframes contentIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out 1.5s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    .r {
      transform-box: fill-box;
      transform-origin: center;
      animation: buildRect 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .r7 { animation-delay: 0.00s; }
    .r6 { animation-delay: 0.12s; }
    .r5 { animation-delay: 0.24s; }
    .r4 { animation-delay: 0.36s; }
    .r3 { animation-delay: 0.48s; }
    .r2 { animation-delay: 0.60s; }
    .r1 { animation-delay: 0.72s; }

    @keyframes buildRect {
      0%   { opacity: 0; transform: scale(0.2); }
      70%  { opacity: 1; transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }

    .name {
      font-size: 20px;
      font-weight: 700;
      color: #f0eaff;
      letter-spacing: 0.01em;
      animation: fadeUp 0.4s ease-out 1.0s both;
    }

    .sub {
      font-size: 12px;
      color: #5a5075;
      margin-top: 4px;
      animation: fadeUp 0.4s ease-out 1.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: 18px;
      animation: fadeUp 0.4s ease-out 1.2s both;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a855f7;
      animation: dotPulse 1.2s ease-in-out 1.4s infinite;
    }
    .d2 { animation-delay: 1.6s; }
    .d3 { animation-delay: 1.8s; }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40%           { opacity: 1;    transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo-wrap">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
        <rect class="r r1" x="4"  y="4"  width="152" height="152" rx="18" fill="#1a1128"/>
        <rect class="r r2" x="16" y="16" width="128" height="128" rx="16" fill="#2d1d4a"/>
        <rect class="r r3" x="28" y="28" width="104" height="104" rx="14" fill="#4a2a7a"/>
        <rect class="r r4" x="40" y="40" width="80"  height="80"  rx="12" fill="#a855f7"/>
        <rect class="r r5" x="52" y="52" width="56"  height="56"  rx="10" fill="#c9a0fb"/>
        <rect class="r r6" x="64" y="64" width="32"  height="32"  rx="7"  fill="#dfc4fd"/>
        <rect class="r r7" x="73" y="73" width="14"  height="14"  rx="4"  fill="#f0e4ff"/>
      </svg>
    </div>
    <p class="name">Nova Launcher</p>
    <p class="sub">wird gestartet…</p>
    <div class="dots">
      <span class="dot d1"></span>
      <span class="dot d2"></span>
      <span class="dot d3"></span>
    </div>
  </div>
</body>
</html>
